<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>보건실 관리 — 선생님</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:'Noto Sans KR',sans-serif;background:#f0f4f8}
.header{background:#185FA5;color:#fff;padding:0 24px;display:flex;align-items:center;height:60px}
.htitle{font-size:18px;font-weight:700;flex:1}
.nav{display:flex;height:100%}
.ntab{padding:0 20px;color:rgba(255,255,255,.7);cursor:pointer;font-size:14px;font-weight:600;border-bottom:3px solid transparent;transition:all .15s;display:flex;align-items:center}
.ntab.on{color:#fff;border-bottom-color:#fff}
.screen{display:none}.screen.on{display:block;height:calc(100vh - 60px);overflow-y:auto}
.qwrap{display:grid;grid-template-columns:1fr 200px;height:calc(100vh - 60px)}
.qpanel{padding:20px;border-right:1px solid #dde5ef;overflow-y:auto}
.alert-bar{padding:10px 16px;background:#dbeafe;border:1px solid #93c5fd;border-radius:10px;font-size:14px;color:#1e40af;margin-bottom:12px;display:none;font-weight:600}
.alert-bar.show{display:block;animation:si .3s ease}
.qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.qtitle{font-size:17px;font-weight:700}
.badge{background:#185FA5;color:#fff;border-radius:20px;padding:4px 16px;font-size:15px;font-weight:700}
.qlist{display:flex;flex-direction:column;gap:8px}
.qitem{padding:14px 16px;background:#fff;border:1.5px solid #e0e8f0;border-radius:12px;display:flex;justify-content:space-between;align-items:center;animation:si .2s ease}
.qitem.new{border-color:#185FA5;background:#eff6ff}
.qitem.danger{border-color:#ff4444;background:#fff5f5}
.qi-name{font-size:17px;font-weight:700;color:#1a1a1a}
.qi-name.danger{color:#cc0000}
.qi-note{font-size:13px;color:#ff2222;font-weight:700;animation:blink .8s infinite;margin-top:3px}
.qi-sub{font-size:13px;color:#666;margin-top:3px}
.qi-time{font-size:13px;color:#999}
.dbtn{padding:7px 16px;border:1.5px solid #c5d5e8;border-radius:8px;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:#555}
.dbtn:hover{background:#e1f5ee;border-color:#3B6D11;color:#1a4d0a}
.empty{text-align:center;padding:60px;color:#aaa;font-size:15px}
.spanel{padding:20px;display:flex;flex-direction:column;gap:12px;background:#f8fafc}
.scard{background:#fff;border:1px solid #e0e8f0;border-radius:12px;padding:14px;text-align:center}
.sc-n{font-size:36px;font-weight:700;color:#185FA5}
.sc-l{font-size:13px;color:#888;margin-top:3px;font-weight:600}
.abtn{width:100%;padding:11px;border:1.5px solid #c5d5e8;border-radius:10px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#555}
.abtn:hover{background:#f0f4f8}
.rbtn{width:100%;padding:11px;border:1.5px solid #dc2626;border-radius:10px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#dc2626}
.rbtn:hover{background:#fef2f2}
.swrap{padding:20px}
.sfilter{display:flex;gap:10px;margin-bottom:16px}
.sfilter select{padding:8px 12px;border:1.5px solid #c5d5e8;border-radius:8px;background:#fff;font-size:14px;color:#333;font-weight:500}
.stat4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.s4c{background:#fff;border:1px solid #e0e8f0;border-radius:12px;padding:14px;text-align:center}
.s4n{font-size:26px;font-weight:700;color:#185FA5}
.s4l{font-size:13px;color:#888;margin-top:4px;font-weight:600}
.chart-box{background:#fff;border:1px solid #e0e8f0;border-radius:14px;padding:18px;margin-bottom:16px}
.chart-lbl{font-size:13px;color:#888;margin-bottom:12px;font-weight:600}
.bars{display:flex;align-items:flex-end;gap:8px;height:120px}
.bcol{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar{background:#b5d4f4;border-radius:4px 4px 0 0;width:100%;min-height:4px;transition:height .3s}
.bar.hi{background:#185FA5}
.bl{font-size:12px;color:#888}
.bv{font-size:12px;font-weight:700;color:#333}
.ltable{width:100%;border-collapse:collapse;font-size:14px}
.ltable th{text-align:left;padding:9px 12px;border-bottom:1.5px solid #e0e8f0;font-weight:700;color:#666;background:#f8fafc}
.ltable td{padding:9px 12px;border-bottom:1px solid #f0f4f8;color:#333}
.stuwrap{padding:20px}
.stu-toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.dl-btn{padding:10px 18px;border:1.5px solid #185FA5;border-radius:10px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#185FA5}
.dl-btn:hover{background:#eff6ff}
.upload-area{flex:1;border:2px dashed #c5d5e8;border-radius:12px;padding:12px 20px;text-align:center;cursor:pointer;transition:all .15s;background:#fff;display:flex;align-items:center;gap:12px;justify-content:center}
.upload-area:hover{background:#f0f4f8;border-color:#185FA5}
.add-form{background:#fff;border:1.5px solid #e0e8f0;border-radius:14px;padding:16px;margin-bottom:16px}
.add-form-title{font-size:14px;font-weight:700;color:#333;margin-bottom:12px}
.add-form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:#888;font-weight:600}
.form-group input{padding:8px 12px;border:1.5px solid #c5d5e8;border-radius:8px;font-size:14px;width:120px}
.form-group input.wide{width:150px}
.form-group input.note{width:200px}
.add-submit{padding:9px 20px;background:#185FA5;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;height:38px}
.add-submit:hover{background:#0d4a8a}
.grade-tabs{display:flex;gap:0;border-bottom:2px solid #e0e8f0;margin-bottom:14px}
.gtab{padding:10px 20px;cursor:pointer;font-size:14px;font-weight:600;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .12s}
.gtab.on{color:#185FA5;border-bottom-color:#185FA5}
.stu-table{width:100%;border-collapse:collapse;font-size:14px}
.stu-table th{text-align:left;padding:9px 12px;border-bottom:1.5px solid #e0e8f0;font-weight:700;color:#666;background:#f8fafc}
.stu-table td{padding:9px 12px;border-bottom:1px solid #f0f4f8;color:#333;vertical-align:middle}
.stu-table tr:last-child td{border-bottom:none}
.note-cell{color:#cc0000;font-weight:600;font-size:13px}
.del-btn{padding:4px 10px;border:1px solid #fca5a5;border-radius:6px;background:transparent;cursor:pointer;font-size:12px;color:#dc2626}
.del-btn:hover{background:#fef2f2}
.edit-note-btn{padding:4px 10px;border:1px solid #c5d5e8;border-radius:6px;background:transparent;cursor:pointer;font-size:12px;color:#555}
.edit-note-btn:hover{background:#f0f4f8}
.info-msg{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:12px;display:none;font-weight:600}
.info-msg.show{display:block}
.info-msg.ok{background:#e1f5ee;color:#085041;border:1.5px solid #5dcaa5}
.info-msg.err{background:#fef2f2;color:#7f1d1d;border:1.5px solid #fca5a5}
.info-msg.progress{background:#eff6ff;color:#1e40af;border:1.5px solid #93c5fd;display:block}
.prog-bar-wrap{height:8px;background:#dbeafe;border-radius:4px;margin-top:8px;overflow:hidden}
.prog-bar{height:100%;background:#185FA5;border-radius:4px;transition:width .3s ease}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:360px}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.modal input{width:100%;padding:10px 14px;border:1.5px solid #c5d5e8;border-radius:8px;font-size:14px;margin-bottom:14px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:8px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-cancel{border:1.5px solid #c5d5e8;background:#fff;color:#555}
.btn-save{border:none;background:#185FA5;color:#fff}
@keyframes si{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>

<div class="header">
  <div class="htitle">보건실 관리</div>
  <div class="nav">
    <div class="ntab on" onclick="goTab('queue')">대기 관리</div>
    <div class="ntab" onclick="goTab('stats')">통계</div>
    <div class="ntab" onclick="goTab('students')">학생 정보</div>
  </div>
</div>

<div id="t-queue" class="screen on">
  <div class="qwrap">
    <div class="qpanel">
      <div class="alert-bar" id="alert-bar">새 학생이 접수했습니다!</div>
      <div class="qhead">
        <span class="qtitle">대기 목록</span>
        <span class="badge" id="t-badge">0명</span>
      </div>
      <div class="qlist" id="t-list"><div class="empty">불러오는 중...</div></div>
    </div>
    <div class="spanel">
      <div class="scard"><div class="sc-n" id="t-waiting">0</div><div class="sc-l">현재 대기</div></div>
      <div class="scard"><div class="sc-n" id="t-done">0</div><div class="sc-l">오늘 처리 완료</div></div>
      <div style="margin-top:auto">
        <button class="rbtn" style="padding:20px;font-size:17px;font-weight:700;line-height:1.4" onclick="clearQ()">🔔 수업 종<br>대기 초기화</button>
      </div>
    </div>
  </div>
</div>

<div id="t-stats" class="screen">
  <div class="swrap">
    <div class="sfilter">
      <select id="period" onchange="renderStats()"><option value="day">오늘 (1일)</option><option value="week">최근 7일</option><option value="month">최근 한달</option><option value="year">최근 1년</option></select>
      <select id="gradeF" onchange="renderStats()"><option value="all">전체 학년</option><option value="1">1학년</option><option value="2">2학년</option><option value="3">3학년</option></select>
      <button class="dl-btn" onclick="exportCSV()" style="margin-left:auto">⬇ CSV 다운로드</button>
    </div>
    <div class="stat4">
      <div class="s4c"><div class="s4n" id="s-today">0</div><div class="s4l">오늘 (1일)</div></div>
      <div class="s4c"><div class="s4n" id="s-week">0</div><div class="s4l">최근 7일</div></div>
      <div class="s4c"><div class="s4n" id="s-month">0</div><div class="s4l">최근 한달</div></div>
      <div class="s4c"><div class="s4n" id="s-total">0</div><div class="s4l">최근 1년</div></div>
    </div>
    <div class="chart-box">
      <div class="chart-lbl">기간별 처리 완료 현황</div>
      <div class="bars" id="bars"></div>
    </div>
    <div style="background:#fff;border:1px solid #e0e8f0;border-radius:14px;padding:18px">
      <div style="font-size:13px;color:#888;margin-bottom:12px;font-weight:600">최근 기록 — 처리 완료된 학생만 (최대 30건)</div>
      <div style="overflow-x:auto"><table class="ltable"><thead><tr><th>날짜</th><th>시간</th><th>학번</th><th>이름</th><th>학년</th><th></th></tr></thead><tbody id="log-body"></tbody></table></div>
    </div>
  </div>
</div>

<div id="t-students" class="screen">
  <div class="stuwrap">
    <div class="stu-toolbar">
      <button class="dl-btn" onclick="downloadTemplate()">템플릿 CSV 다운로드</button>
      <button class="dl-btn" onclick="downloadStudentsCSV()" style="border-color:#27ae60;color:#27ae60">📥 학생 목록 다운로드</button>
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
        <span style="font-size:14px;color:#555;font-weight:500">CSV / 엑셀 업로드 (학번, 이름, 비고)</span>
      </div>
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" style="display:none" onchange="handleUpload(event)">
    </div>
    <div class="info-msg" id="info-msg"><span id="info-msg-text"></span><div class="prog-bar-wrap" id="prog-wrap" style="display:none"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div></div>
    <div class="add-form">
      <div class="add-form-title">학생 개별 추가 (전입생 등)</div>
      <div class="add-form-row">
        <div class="form-group"><label>학번 (4자리)</label><input type="text" id="add-key" placeholder="1101" maxlength="4"></div>
        <div class="form-group"><label>이름</label><input type="text" id="add-name" placeholder="홍길동" class="wide"></div>
        <div class="form-group"><label>비고 (선택)</label><input type="text" id="add-note" placeholder="알레르기 등" class="note"></div>
        <button class="add-submit" onclick="addStudentManual()">추가</button>
      </div>
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px">
        <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
          <span style="font-size:14px;color:#666;font-weight:600" id="stu-count-msg">불러오는 중...</span>
          <span style="font-size:12px;color:#999" id="stu-grade-msg"></span>
        </div>
        <input type="text" id="stu-search" placeholder="🔍 학번 또는 이름 검색..." oninput="renderStudentTable()" style="flex:1;max-width:260px;padding:7px 12px;border:1.5px solid #c5d5e8;border-radius:8px;font-size:14px;outline:none">
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="rbtn" style="width:auto;padding:7px 12px;font-size:13px" onclick="clearStudents('all')">전체 삭제</button>
          <button class="abtn" style="width:auto;padding:7px 12px;font-size:13px" onclick="clearStudents(1)">1학년 삭제</button>
          <button class="abtn" style="width:auto;padding:7px 12px;font-size:13px" onclick="clearStudents(2)">2학년 삭제</button>
          <button class="abtn" style="width:auto;padding:7px 12px;font-size:13px" onclick="clearStudents(3)">3학년 삭제</button>
        </div>
      </div>
      <div class="grade-tabs" id="grade-tabs">
        <div class="gtab on" onclick="showGrade('all')">전체</div>
        <div class="gtab" onclick="showGrade(1)">1학년</div>
        <div class="gtab" onclick="showGrade(2)">2학년</div>
        <div class="gtab" onclick="showGrade(3)">3학년</div>
        <div class="gtab" onclick="showGrade('note')">비고 ⚠</div>
      </div>
      <div style="overflow-x:auto;max-height:400px;overflow-y:auto;background:#fff;border:1px solid #e0e8f0;border-radius:12px">
        <table class="stu-table">
          <thead><tr><th>학번</th><th>이름</th><th>학년</th><th>반</th><th>번호</th><th>비고</th><th></th></tr></thead>
          <tbody id="stu-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">비고 수정</h3>
    <input type="text" id="modal-note" placeholder="비고 내용 (없으면 비워두세요)">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveNote()">저장</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="stu-modal-bg">
  <div class="modal" style="width:420px">
    <h3 id="stu-modal-title">학생 정보 수정</h3>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
      <div style="display:flex;gap:8px;align-items:center">
        <label style="font-size:13px;color:#666;width:50px;flex-shrink:0">학번</label>
        <input type="text" id="stu-edit-key" maxlength="4" style="flex:1;padding:8px 12px;border:1.5px solid #c5d5e8;border-radius:8px;font-size:14px">
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <label style="font-size:13px;color:#666;width:50px;flex-shrink:0">이름</label>
        <input type="text" id="stu-edit-name" style="flex:1;padding:8px 12px;border:1.5px solid #c5d5e8;border-radius:8px;font-size:14px">
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <label style="font-size:13px;color:#666;width:50px;flex-shrink:0">비고</label>
        <input type="text" id="stu-edit-note" placeholder="없으면 비워두세요" style="flex:1;padding:8px 12px;border:1.5px solid #c5d5e8;border-radius:8px;font-size:14px">
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeStuModal()">취소</button>
      <button class="btn-save" onclick="saveStuEdit()">저장</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="log-modal-bg">
  <div class="modal" style="width:420px">
    <h3>기록 수정</h3>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
      <div style="display:flex;gap:8px;align-items:center">
        <label style="font-size:13px;color:#666;width:50px;flex-shrink:0">날짜</label>
        <input type="text" id="log-edit-date" style="flex:1;padding:8px 12px;border:1.5px solid #c5d5e8;border-radius:8px;font-size:14px">
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <label style="font-size:13px;color:#666;width:50px;flex-shrink:0">시간</label>
        <input type="text" id="log-edit-time" style="flex:1;padding:8px 12px;border:1.5px solid #c5d5e8;border-radius:8px;font-size:14px">
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <label style="font-size:13px;color:#666;width:50px;flex-shrink:0">학번</label>
        <input type="text" id="log-edit-key" style="flex:1;padding:8px 12px;border:1.5px solid #c5d5e8;border-radius:8px;font-size:14px">
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <label style="font-size:13px;color:#666;width:50px;flex-shrink:0">이름</label>
        <input type="text" id="log-edit-name" style="flex:1;padding:8px 12px;border:1.5px solid #c5d5e8;border-radius:8px;font-size:14px">
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeLogModal()">취소</button>
      <button class="btn-save" onclick="saveLogEdit()">저장</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
const API='https://script.google.com/macros/s/AKfycbxLNzuJwrLEZaMjYjbN7RmiHzCtgh16lJdrq9UPsOBswDsiubsM-zt2JbsglUHXMC0hdw/exec';
let prevQLen=0,cachedLogs=[],stuGradeFilter='all',studentDB={},modalKey=null;

function goTab(t){
  ['queue','stats','students'].forEach((id,i)=>{
    document.getElementById('t-'+id).classList.toggle('on',id===t);
    document.querySelectorAll('.ntab')[i].classList.toggle('on',id===t);
  });
  if(t==='stats')loadAndRenderStats();
  if(t==='students'){loadStudentsFromServer();renderStudentTable();}
}

function apiGet(params){
  return new Promise((resolve)=>{
    const cb='cb'+Date.now()+Math.floor(Math.random()*9999);
    window[cb]=(d)=>{
      delete window[cb];
      const el=document.getElementById('s_'+cb);
      if(el)el.remove();
      resolve(d);
    };
    const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(String(v))).join('&');
    const s=document.createElement('script');
    s.id='s_'+cb;
    s.src=API+'?'+qs+'&callback='+cb;
    s.onerror=()=>{delete window[cb];s.remove();resolve({error:'network error'});};
    document.head.appendChild(s);
    setTimeout(()=>{
      if(window[cb]){delete window[cb];const el=document.getElementById('s_'+cb);if(el)el.remove();resolve({error:'timeout'});}
    },15000);

function renderStats(){
  const gf=document.getElementById('gradeF').value;
  let fl=gf==='all'?cachedLogs:cachedLogs.filter(l=>String(l.grade)===gf);
  const today=new Date(),todayStr=today.toLocaleDateString('ko-KR');
  const d7=new Date(today);d7.setDate(today.getDate()-7);
  const d30=new Date(today);d30.setDate(today.getDate()-30);
  const d365=new Date(today);d365.setFullYear(today.getFullYear()-1);
  document.getElementById('s-today').textContent=fl.filter(l=>l.date===todayStr).length;
  document.getElementById('s-week').textContent=fl.filter(l=>new Date(l.ts)>=d7).length;
  document.getElementById('s-month').textContent=fl.filter(l=>new Date(l.ts)>=d30).length;
  document.getElementById('s-total').textContent=fl.filter(l=>new Date(l.ts)>=d365).length;
  const period=document.getElementById('period').value;
  let cd=[];
  if(period==='day'){
    // 오늘 시간대별 (24시간)
    for(let i=0;i<24;i++){
      const cnt=fl.filter(x=>{const d=new Date(x.ts);return d.toLocaleDateString('ko-KR')===todayStr&&d.getHours()===i;}).length;
      cd.push({l:`${i}시`,v:cnt});
    }
    // 값 있는 구간만 ±1시간 표시
    const hours=cd.map((c,i)=>c.v>0?i:-1).filter(i=>i>=0);
    if(hours.length>0){const s=Math.max(0,hours[0]-1),e=Math.min(23,hours[hours.length-1]+1);cd=cd.slice(s,e+1);}
    else{const h=new Date().getHours();cd=cd.slice(Math.max(0,h-4),h+1);}
  }else if(period==='week'){
    for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const ds=d.toLocaleDateString('ko-KR');cd.push({l:d.toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}).replace('. ','').replace('.',''),v:fl.filter(x=>x.date===ds).length});}
  }else if(period==='month'){
    for(let i=29;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const ds=d.toLocaleDateString('ko-KR');cd.push({l:i%5===0?d.toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}).replace('. ','').replace('.',''):'',v:fl.filter(x=>x.date===ds).length});}
  }else{
    for(let i=11;i>=0;i--){const d=new Date(today.getFullYear(),today.getMonth()-i,1);cd.push({l:`${d.getMonth()+1}월`,v:fl.filter(x=>{const ld=new Date(x.ts);return ld.getMonth()===d.getMonth()&&ld.getFullYear()===d.getFullYear();}).length});}}
  const mx=Math.max(...cd.map(d=>d.v),1);
  document.getElementById('bars').innerHTML=cd.map(d=>`<div class="bcol"><span class="bv">${d.v||''}</span><div class="bar${d.v===mx&&d.v>0?' hi':''}" style="height:${Math.round(d.v/mx*100)}px"></div><span class="bl">${d.l}</span></div>`).join('');
  // 현재 period 기간 필터된 로그를 최근기록 테이블에 표시
  let periodLogs=fl;
  if(period==='day')periodLogs=fl.filter(l=>l.date===todayStr);
  else if(period==='week')periodLogs=fl.filter(l=>new Date(l.ts)>=d7);
  else if(period==='month')periodLogs=fl.filter(l=>new Date(l.ts)>=d30);
  else periodLogs=fl.filter(l=>new Date(l.ts)>=d365);
  const recent=[...periodLogs].reverse().slice(0,30);
  document.getElementById('log-body').innerHTML=recent.length?recent.map((e,i)=>`<tr>
    <td>${e.date}</td><td>${e.time}</td><td>${e.key}</td><td>${e.name}</td><td>${e.grade}학년</td>
    <td style="display:flex;gap:5px;padding:6px 12px">
      <button class="edit-note-btn" onclick="editLog(${cachedLogs.indexOf(e)})">수정</button>
      <button class="del-btn" onclick="deleteLog(${cachedLogs.indexOf(e)})">삭제</button>
    </td></tr>`).join(''):'<tr><td colspan="6" style="text-align:center;color:#aaa;padding:20px">기록 없음</td></tr>';
}

function handleUpload(evt){
  const file=evt.target.files[0];if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  reader.onload=async function(e){
    let rows=[];
    if(ext==='csv'){
      const arr=new Uint8Array(e.target.result);
      const isEuc=arr[0]>0x7F&&!(arr[0]===0xEF&&arr[1]===0xBB);
      let text=new TextDecoder(isEuc?'euc-kr':'utf-8').decode(arr);
      text=text.replace(/^\uFEFF/,'');
      const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
      const header=lines[0].split(',').map(h=>h.trim());
      const ii=header.findIndex(h=>h==='학번'||h==='id'||h==='ID');
      const ni=header.findIndex(h=>h==='이름'||h==='name');
      const bi=header.findIndex(h=>h==='비고'||h==='note');
      if(ii<0||ni<0){showMsg('학번, 이름 컬럼을 찾을 수 없습니다.','err');return;}
      for(let i=1;i<lines.length;i++){const c=lines[i].split(',');if(c[ii])rows.push({id:c[ii].trim(),name:c[ni]?.trim()||'',note:bi>=0?c[bi]?.trim()||'':''});}
    }else{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws2=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws2,{header:1});
      const header=data[0].map(h=>String(h).trim());
      const ii=header.findIndex(h=>h==='학번'||h==='id');
      const ni=header.findIndex(h=>h==='이름'||h==='name');
      const bi=header.findIndex(h=>h==='비고'||h==='note');
      if(ii<0||ni<0){showMsg('학번, 이름 컬럼을 찾을 수 없습니다.','err');return;}
      for(let i=1;i<data.length;i++){if(data[i][ii])rows.push({id:String(data[i][ii]).trim(),name:String(data[i][ni]||'').trim(),note:bi>=0?String(data[i][bi]||'').trim():''});}
    }
    const students=[];let skip=0;
    rows.forEach(r=>{
      const id=r.id;if(!id||id.length<4){skip++;return;}
      const g=parseInt(id[0]),c=parseInt(id[1]),n=parseInt(id.slice(2));
      if(g<1||g>3||c<1||c>9||isNaN(n)){skip++;return;}
      students.push({key:id,name:r.name,grade:g,cls:c,note:r.note||''});
    });
    // 기존 데이터와 병합 (같은 학번이면 덮어쓰기, 없으면 추가)
    const merged={...studentDB};
    students.forEach(s=>{merged[s.key]=s;});
    const allStudents=Object.values(merged);
    showProgress(0, allStudents.length);
    const res=await saveStudentsChunked(allStudents);
    if(res.error){showMsg('저장 실패: '+res.error,'err');return;}
    showMsg(`저장 완료 — 신규/수정 ${students.length}명 (전체 ${allStudents.length}명, 스킵: ${skip}건)`,'ok');
    await loadStudentsFromServer();evt.target.value='';
  };
  reader.readAsArrayBuffer(file);
}

async function saveStudentsChunked(students){
  const CHUNK=5,total=students.length;
  const totalChunks=Math.max(1,Math.ceil(total/CHUNK));
  for(let i=0;i<totalChunks;i++){
    const chunk=students.slice(i*CHUNK,(i+1)*CHUNK);
    let res,retry=0;
    while(retry<3){
      res=await apiGet({
        action:'saveStudentsChunk',
        chunk:encodeURIComponent(JSON.stringify(chunk)),
        index:i,
        total:totalChunks,
        totalCount:total
      });
      if(!res.error)break;
      retry++;
      showProgress(i*CHUNK,total,`재시도 중... (${retry}/3)`);
      await new Promise(r=>setTimeout(r,1000));
    }
    if(res.error)return res;
    showProgress(Math.min((i+1)*CHUNK,total),total);
  }
  return {count:total};
}

  const e=cachedLogs[idx];
  if(!e)return;
  document.getElementById('log-edit-date').value=e.date;
  document.getElementById('log-edit-time').value=e.time;
  document.getElementById('log-edit-key').value=e.key;
  document.getElementById('log-edit-name').value=e.name;
  document.getElementById('log-modal-bg').classList.add('show');
}
function closeLogModal(){document.getElementById('log-modal-bg').classList.remove('show');logEditIdx=null;}
function saveLogEdit(){
  if(logEditIdx===null)return;
  cachedLogs[logEditIdx].date=document.getElementById('log-edit-date').value.trim();
  cachedLogs[logEditIdx].time=document.getElementById('log-edit-time').value.trim();
  cachedLogs[logEditIdx].key=document.getElementById('log-edit-key').value.trim();
  cachedLogs[logEditIdx].name=document.getElementById('log-edit-name').value.trim();
  closeLogModal();
  renderStats();
}
function deleteLog(idx){
  const e=cachedLogs[idx];
  if(!confirm(`${e.name}(${e.key}) ${e.date} 기록을 삭제하시겠습니까?`))return;
  if(!confirm('정말로 삭제합니다. 되돌릴 수 없습니다.'))return;
  cachedLogs.splice(idx,1);
  renderStats();
}
let _msgTimer=null;
function showMsg(txt,type){
  const m=document.getElementById('info-msg');
  document.getElementById('info-msg-text').textContent=txt;
  document.getElementById('prog-wrap').style.display='none';
  m.className='info-msg show '+type;
  if(_msgTimer)clearTimeout(_msgTimer);
  _msgTimer=setTimeout(()=>m.classList.remove('show'),4000);
}
function showProgress(done,total,label){
  const m=document.getElementById('info-msg');
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('info-msg-text').textContent=label||`저장 중... ${done}/${total}명 (${pct}%)`;
  document.getElementById('prog-bar').style.width=pct+'%';
  if(!m.classList.contains('progress')){
    document.getElementById('prog-wrap').style.display='block';
    m.className='info-msg progress';
  }
  if(_msgTimer){clearTimeout(_msgTimer);_msgTimer=null;}
}

renderQueue();
loadStudentsFromServer();
loadAndRenderStats();
setInterval(renderQueue,5000);
setInterval(loadStudentsFromServer,60000);
</script>
