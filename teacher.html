<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>보건실 관리 — 선생님</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:'Noto Sans KR',sans-serif;background:#f0f4f8}
.header{background:#185FA5;color:#fff;padding:0 24px;display:flex;align-items:center;height:60px}
.htitle{font-size:18px;font-weight:700;flex:1}
.nav{display:flex;height:100%}
.ntab{padding:0 20px;color:rgba(255,255,255,.7);cursor:pointer;font-size:14px;font-weight:600;border-bottom:3px solid transparent;transition:all .15s;display:flex;align-items:center}
.ntab.on{color:#fff;border-bottom-color:#fff}
.screen{display:none}.screen.on{display:block;height:calc(100vh - 60px);overflow-y:auto}

/* 대기 관리 */
.qwrap{display:grid;grid-template-columns:1fr 200px;height:calc(100vh - 60px)}
.qpanel{padding:20px;border-right:1px solid #dde5ef;overflow-y:auto}
.alert-bar{padding:10px 16px;background:#dbeafe;border:1px solid #93c5fd;border-radius:10px;font-size:14px;color:#1e40af;margin-bottom:12px;display:none;font-weight:600}
.alert-bar.show{display:block;animation:si .3s ease}
.qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.qtitle{font-size:17px;font-weight:700}
.badge{background:#185FA5;color:#fff;border-radius:20px;padding:4px 16px;font-size:15px;font-weight:700}
.qlist{display:flex;flex-direction:column;gap:8px}
.qitem{padding:14px 16px;background:#fff;border:1.5px solid #e0e8f0;border-radius:12px;display:flex;justify-content:space-between;align-items:center;animation:si .2s ease}
.qitem.new{border-color:#185FA5;background:#eff6ff}
.qi-name{font-size:17px;font-weight:700;color:#1a1a1a}
.qi-sub{font-size:13px;color:#666;margin-top:3px}
.qi-time{font-size:13px;color:#999}
.dbtn{padding:7px 16px;border:1.5px solid #c5d5e8;border-radius:8px;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:#555}
.dbtn:hover{background:#e1f5ee;border-color:#3B6D11;color:#1a4d0a}
.empty{text-align:center;padding:60px;color:#aaa;font-size:15px}
.spanel{padding:20px;display:flex;flex-direction:column;gap:12px;background:#f8fafc}
.scard{background:#fff;border:1px solid #e0e8f0;border-radius:12px;padding:14px;text-align:center}
.sc-n{font-size:36px;font-weight:700;color:#185FA5}
.sc-l{font-size:13px;color:#888;margin-top:3px;font-weight:600}
.abtn{width:100%;padding:11px;border:1.5px solid #c5d5e8;border-radius:10px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#555}
.abtn:hover{background:#f0f4f8}
.rbtn{width:100%;padding:11px;border:1.5px solid #dc2626;border-radius:10px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#dc2626}
.rbtn:hover{background:#fef2f2}

/* 통계 */
.swrap{padding:20px}
.sfilter{display:flex;gap:10px;margin-bottom:16px}
.sfilter select{padding:8px 12px;border:1.5px solid #c5d5e8;border-radius:8px;background:#fff;font-size:14px;color:#333;font-weight:500}
.stat4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.s4c{background:#fff;border:1px solid #e0e8f0;border-radius:12px;padding:14px;text-align:center}
.s4n{font-size:26px;font-weight:700;color:#185FA5}
.s4l{font-size:13px;color:#888;margin-top:4px;font-weight:600}
.chart-box{background:#fff;border:1px solid #e0e8f0;border-radius:14px;padding:18px;margin-bottom:16px}
.chart-lbl{font-size:13px;color:#888;margin-bottom:12px;font-weight:600}
.bars{display:flex;align-items:flex-end;gap:8px;height:120px}
.bcol{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar{background:#b5d4f4;border-radius:4px 4px 0 0;width:100%;min-height:4px;transition:height .3s}
.bar.hi{background:#185FA5}
.bl{font-size:12px;color:#888}
.bv{font-size:12px;font-weight:700;color:#333}
.ltable{width:100%;border-collapse:collapse;font-size:14px}
.ltable th{text-align:left;padding:9px 12px;border-bottom:1.5px solid #e0e8f0;font-weight:700;color:#666;background:#f8fafc}
.ltable td{padding:9px 12px;border-bottom:1px solid #f0f4f8;color:#333}

/* 학생 정보 */
.stuwrap{padding:20px}
.upload-area{border:2px dashed #c5d5e8;border-radius:14px;padding:32px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:18px;background:#fff}
.upload-area:hover{background:#f0f4f8;border-color:#185FA5}
.upload-area p{font-size:15px;color:#666;margin-top:10px;font-weight:500}
.dl-btn{padding:10px 20px;border:1.5px solid #185FA5;border-radius:10px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#185FA5;margin-bottom:16px}
.dl-btn:hover{background:#eff6ff}
.grade-tabs{display:flex;gap:0;border-bottom:2px solid #e0e8f0;margin-bottom:14px}
.gtab{padding:10px 20px;cursor:pointer;font-size:14px;font-weight:600;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .12s}
.gtab.on{color:#185FA5;border-bottom-color:#185FA5}
.stu-table{width:100%;border-collapse:collapse;font-size:14px}
.stu-table th{text-align:left;padding:9px 12px;border-bottom:1.5px solid #e0e8f0;font-weight:700;color:#666;background:#f8fafc}
.stu-table td{padding:9px 12px;border-bottom:1px solid #f0f4f8;color:#333}
.info-msg{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:12px;display:none;font-weight:600}
.info-msg.show{display:block}
.info-msg.ok{background:#e1f5ee;color:#085041;border:1.5px solid #5dcaa5}
.info-msg.err{background:#fef2f2;color:#7f1d1d;border:1.5px solid #fca5a5}
.loading{text-align:center;padding:30px;color:#aaa;font-size:14px}
@keyframes si{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="header">
  <div class="htitle">보건실 관리</div>
  <div class="nav">
    <div class="ntab on" onclick="goTab('queue')">대기 관리</div>
    <div class="ntab" onclick="goTab('stats')">통계</div>
    <div class="ntab" onclick="goTab('students')">학생 정보</div>
  </div>
</div>

<!-- 대기 관리 -->
<div id="t-queue" class="screen on">
  <div class="qwrap">
    <div class="qpanel">
      <div class="alert-bar" id="alert-bar">새 학생이 접수했습니다!</div>
      <div class="qhead">
        <span class="qtitle">대기 목록</span>
        <span class="badge" id="t-badge">0명</span>
      </div>
      <div class="qlist" id="t-list"><div class="loading">불러오는 중...</div></div>
    </div>
    <div class="spanel">
      <div class="scard"><div class="sc-n" id="t-waiting">0</div><div class="sc-l">현재 대기</div></div>
      <div class="scard"><div class="sc-n" id="t-done">0</div><div class="sc-l">오늘 처리 완료</div></div>
      <button class="abtn" onclick="exportCSV()">CSV 내보내기</button>
      <div style="margin-top:auto">
        <button class="rbtn" onclick="clearQ()">수업 종 — 대기 초기화</button>
      </div>
    </div>
  </div>
</div>

<!-- 통계 -->
<div id="t-stats" class="screen">
  <div class="swrap">
    <div class="sfilter">
      <select id="period" onchange="renderStats()">
        <option value="day">일별 (최근 7일)</option>
        <option value="week">주별 (최근 4주)</option>
        <option value="month">월별 (최근 6개월)</option>
      </select>
      <select id="gradeF" onchange="renderStats()">
        <option value="all">전체 학년</option>
        <option value="1">1학년</option>
        <option value="2">2학년</option>
        <option value="3">3학년</option>
      </select>
    </div>
    <div class="stat4">
      <div class="s4c"><div class="s4n" id="s-today">0</div><div class="s4l">오늘</div></div>
      <div class="s4c"><div class="s4n" id="s-week">0</div><div class="s4l">이번 주</div></div>
      <div class="s4c"><div class="s4n" id="s-month">0</div><div class="s4l">이번 달</div></div>
      <div class="s4c"><div class="s4n" id="s-total">0</div><div class="s4l">누적 전체</div></div>
    </div>
    <div class="chart-box">
      <div class="chart-lbl">기간별 처리 완료 현황</div>
      <div class="bars" id="bars"></div>
    </div>
    <div style="background:#fff;border:1px solid #e0e8f0;border-radius:14px;padding:18px">
      <div style="font-size:13px;color:#888;margin-bottom:12px;font-weight:600">최근 기록 — 처리 완료된 학생만 (최대 30건)</div>
      <div style="overflow-x:auto">
        <table class="ltable">
          <thead><tr><th>날짜</th><th>시간</th><th>학번</th><th>이름</th><th>학년</th></tr></thead>
          <tbody id="log-body"><tr><td colspan="5" style="text-align:center;color:#aaa;padding:20px">불러오는 중...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 학생 정보 -->
<div id="t-students" class="screen">
  <div class="stuwrap">
    <button class="dl-btn" onclick="downloadTemplate()">템플릿 CSV 다운로드</button>
    <div class="info-msg" id="info-msg"></div>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="1.5" style="margin:0 auto;display:block"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
      <p>CSV 또는 엑셀 파일을 클릭해서 업로드</p>
      <p style="font-size:13px;color:#aaa;margin-top:6px">컬럼: 학번, 이름 (필수)</p>
    </div>
    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" style="display:none" onchange="handleUpload(event)">
    <div id="stu-section" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:14px;color:#666;font-weight:600" id="stu-count-msg"></span>
        <button class="abtn" style="width:auto;padding:7px 16px" onclick="clearStudents()">데이터 삭제</button>
      </div>
      <div class="grade-tabs" id="grade-tabs">
        <div class="gtab on" onclick="showGrade('all')">전체</div>
        <div class="gtab" onclick="showGrade(1)">1학년</div>
        <div class="gtab" onclick="showGrade(2)">2학년</div>
        <div class="gtab" onclick="showGrade(3)">3학년</div>
      </div>
      <div style="overflow-x:auto;max-height:400px;overflow-y:auto;background:#fff;border:1px solid #e0e8f0;border-radius:12px">
        <table class="stu-table">
          <thead><tr><th>학번</th><th>이름</th><th>학년</th><th>반</th><th>번호</th></tr></thead>
          <tbody id="stu-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
const API='https://script.google.com/macros/s/AKfycbw-cC4mDisCheRz-HAQuW5K6QO1OEeNF0S8QNc-EWveILWjORKtV9edzAQm0qucWoLeoQ/exec';
let prevQLen=0,cachedLogs=[],stuGradeFilter='all';

function goTab(t){
  ['queue','stats','students'].forEach((id,i)=>{
    document.getElementById('t-'+id).classList.toggle('on',id===t);
    document.querySelectorAll('.ntab')[i].classList.toggle('on',id===t);
  });
  if(t==='stats')loadAndRenderStats();
  if(t==='students')renderStudentTable();
}

async function apiCall(params){
  try{
    const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    const r=await fetch(API+'?'+qs);
    return await r.json();
  }catch(e){return{error:e.toString()}}
}

async function renderQueue(){
  const res=await apiCall({action:'getQueue'});
  if(res.error||!res.queue)return;
  const q=res.queue;
  const isNew=q.length>prevQLen;
  if(isNew){const a=document.getElementById('alert-bar');a.classList.add('show');setTimeout(()=>a.classList.remove('show'),3000);}
  prevQLen=q.length;
  document.getElementById('t-badge').textContent=q.length+'명';
  document.getElementById('t-waiting').textContent=q.length;
  const todayStr=new Date().toLocaleDateString('ko-KR');
  document.getElementById('t-done').textContent=cachedLogs.filter(l=>l.date===todayStr).length;
  const list=document.getElementById('t-list');
  if(!q.length){list.innerHTML='<div class="empty">대기 중인 학생이 없습니다</div>';return;}
  list.innerHTML=q.map((e,i)=>`<div class="qitem${i===q.length-1&&isNew?' new':''}">
    <div>
      <div class="qi-name">${e.order}. ${e.name}</div>
      <div class="qi-sub">${e.key} &nbsp;·&nbsp; ${e.grade}학년 ${e.cls}반 ${e.num}번</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
      <span class="qi-time">${e.time}</span>
      <button class="dbtn" onclick="doneItem('${e.key}')">완료</button>
    </div>
  </div>`).join('');
}

async function doneItem(key){
  const res=await apiCall({action:'doneQueue',key});
  if(!res.error){await loadAndRenderStats();renderQueue();}
}

async function clearQ(){
  if(!confirm('종이 쳤습니다. 남은 대기 목록을 초기화하시겠습니까?\n\n※ 초기화된 학생은 통계에 포함되지 않습니다.'))return;
  await apiCall({action:'clearQueue'});
  prevQLen=0;
  renderQueue();
}

async function loadAndRenderStats(){
  const res=await apiCall({action:'getLogs'});
  if(!res.error&&res.logs)cachedLogs=res.logs;
  renderStats();
}

function renderStats(){
  const gf=document.getElementById('gradeF').value;
  let fl=gf==='all'?cachedLogs:cachedLogs.filter(l=>String(l.grade)===gf);
  const today=new Date(),todayStr=today.toLocaleDateString('ko-KR');
  const ws=new Date(today);ws.setDate(today.getDate()-today.getDay());
  const ms=new Date(today.getFullYear(),today.getMonth(),1);
  document.getElementById('s-today').textContent=fl.filter(l=>l.date===todayStr).length;
  document.getElementById('s-week').textContent=fl.filter(l=>new Date(l.ts)>=ws).length;
  document.getElementById('s-month').textContent=fl.filter(l=>new Date(l.ts)>=ms).length;
  document.getElementById('s-total').textContent=fl.length;
  const period=document.getElementById('period').value;
  let cd=[];
  if(period==='day'){for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const ds=d.toLocaleDateString('ko-KR');cd.push({l:d.toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}).replace('. ','').replace('.',''),v:fl.filter(x=>x.date===ds).length});}}
  else if(period==='week'){for(let i=3;i>=0;i--){const s=new Date(today);s.setDate(today.getDate()-today.getDay()-i*7);const e2=new Date(s);e2.setDate(s.getDate()+6);cd.push({l:`${s.getMonth()+1}/${s.getDate()}주`,v:fl.filter(x=>{const d=new Date(x.ts);return d>=s&&d<=e2;}).length});}}
  else{for(let i=5;i>=0;i--){const d=new Date(today.getFullYear(),today.getMonth()-i,1);cd.push({l:`${d.getMonth()+1}월`,v:fl.filter(x=>{const ld=new Date(x.ts);return ld.getMonth()===d.getMonth()&&ld.getFullYear()===d.getFullYear();}).length});}}
  const mx=Math.max(...cd.map(d=>d.v),1);
  document.getElementById('bars').innerHTML=cd.map(d=>`<div class="bcol"><span class="bv">${d.v}</span><div class="bar${d.v===mx&&d.v>0?' hi':''}" style="height:${Math.round(d.v/mx*100)}px"></div><span class="bl">${d.l}</span></div>`).join('');
  const recent=[...fl].reverse().slice(0,30);
  document.getElementById('log-body').innerHTML=recent.length?recent.map(e=>`<tr><td>${e.date}</td><td>${e.time}</td><td>${e.key}</td><td>${e.name}</td><td>${e.grade}학년</td></tr>`).join(''):'<tr><td colspan="5" style="text-align:center;color:#aaa;padding:20px">기록 없음</td></tr>';
}

function exportCSV(){
  if(!cachedLogs.length){alert('저장된 기록이 없습니다');return;}
  const csv='\uFEFF날짜,시간,학번,이름,학년,반,번호\n'+cachedLogs.map(e=>`${e.date},${e.time},${e.key},${e.name},${e.grade},${e.cls},${e.num}`).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`보건실_기록_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

function downloadTemplate(){
  const csv='\uFEFF학번,이름\n1101,홍길동\n1102,김철수\n2101,이영희\n3101,박민수';
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download='학생정보_템플릿.csv';a.click();
}

function getStudents(){try{return JSON.parse(localStorage.getItem('hrStudents')||'{}')}catch{return{}}}

function handleUpload(evt){
  const file=evt.target.files[0];if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  reader.onload=function(e){
    let rows=[];
    if(ext==='csv'){
      const arr=new Uint8Array(e.target.result);
      const isEuc=arr[0]>0x7F&&!(arr[0]===0xEF&&arr[1]===0xBB);
      let text=new TextDecoder(isEuc?'euc-kr':'utf-8').decode(arr);
      text=text.replace(/^\uFEFF/,'');
      const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
      const header=lines[0].split(',').map(h=>h.trim());
      const ii=header.findIndex(h=>h==='학번'||h==='id'||h==='ID');
      const ni=header.findIndex(h=>h==='이름'||h==='name');
      if(ii<0||ni<0){showMsg('학번, 이름 컬럼을 찾을 수 없습니다.','err');return;}
      for(let i=1;i<lines.length;i++){const c=lines[i].split(',');if(c[ii])rows.push({id:c[ii].trim(),name:c[ni]?.trim()});}
    }else{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws2=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws2,{header:1});
      const header=data[0].map(h=>String(h).trim());
      const ii=header.findIndex(h=>h==='학번'||h==='id');
      const ni=header.findIndex(h=>h==='이름'||h==='name');
      if(ii<0||ni<0){showMsg('학번, 이름 컬럼을 찾을 수 없습니다.','err');return;}
      for(let i=1;i<data.length;i++){if(data[i][ii])rows.push({id:String(data[i][ii]).trim(),name:String(data[i][ni]).trim()});}
    }
    const db={};let ok=0,skip=0;
    rows.forEach(r=>{
      const id=r.id;if(!id||id.length<4){skip++;return;}
      const g=parseInt(id[0]),c=parseInt(id[1]),n=parseInt(id.slice(2));
      if(g<1||g>3||c<1||c>9||isNaN(n)){skip++;return;}
      db[id]={name:r.name,grade:g,class:c,num:n};ok++;
    });
    localStorage.setItem('hrStudents',JSON.stringify(db));
    showMsg(`${ok}명 학생 정보 등록 완료 (스킵: ${skip}건)`,'ok');
    renderStudentTable();evt.target.value='';
  };
  reader.readAsArrayBuffer(file);
}

function showMsg(txt,type){const m=document.getElementById('info-msg');m.textContent=txt;m.className='info-msg show '+type;setTimeout(()=>m.classList.remove('show'),4000);}

function showGrade(g){
  stuGradeFilter=g;
  document.querySelectorAll('#grade-tabs .gtab').forEach((t,i)=>t.classList.toggle('on',['all',1,2,3][i]===g));
  renderStudentTable();
}

function renderStudentTable(){
  const db=getStudents(),keys=Object.keys(db);
  const sec=document.getElementById('stu-section');
  if(!keys.length){sec.style.display='none';return;}
  sec.style.display='block';
  let filtered=keys.filter(k=>stuGradeFilter==='all'||db[k].grade===stuGradeFilter);
  filtered.sort((a,b)=>a.localeCompare(b));
  document.getElementById('stu-count-msg').textContent=`전체 ${keys.length}명 등록 · 표시: ${filtered.length}명`;
  document.getElementById('stu-body').innerHTML=filtered.length
    ?filtered.map(k=>`<tr><td>${k}</td><td>${db[k].name}</td><td>${db[k].grade}학년</td><td>${db[k].class}반</td><td>${db[k].num}번</td></tr>`).join('')
    :'<tr><td colspan="5" style="text-align:center;color:#aaa;padding:20px">해당 학년 데이터 없음</td></tr>';
}

function clearStudents(){if(!confirm('학생 데이터를 삭제하시겠습니까?'))return;localStorage.removeItem('hrStudents');renderStudentTable();}

renderQueue();
setInterval(renderQueue,5000);
</script>
