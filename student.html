<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="보건실 접수">
<meta name="theme-color" content="#185FA5">
<link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22%EB%B3%B4%EA%B1%B4%EC%8B%A4+%EB%8C%80%EA%B8%B0+%EC%A0%91%EC%88%98%22%2C%22short_name%22%3A%22%EB%B3%B4%EA%B1%B4%EC%8B%A4%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23185FA5%22%2C%22theme_color%22%3A%22%23185FA5%22%2C%22start_url%22%3A%22.%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fpng%3Bbase64%2CiVBORw0KGgoAAAANSUhEUgAAAIAAAACACAYAAADDPmHLAAAABmJLR0QA%2FwD%2FAP%2BgvaeTAAAAcElEQVR4nO3BMQEAAADCoPVP7WsIoAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAeAMBxAABHgAAAABJRU5ErkJggg%3D%3D%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">
<title>보건실 대기 접수</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html{height:100%}
body{width:100%;height:100%;height:100dvh;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;display:flex;flex-direction:column}
.header{background:#185FA5;color:#fff;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;height:68px;flex-shrink:0}
.htitle{font-size:28px;font-weight:700}
.clock-box{text-align:right}
.clock-time{font-size:30px;font-weight:700;letter-spacing:2px;font-variant-numeric:tabular-nums}
.clock-date{font-size:13px;opacity:.85;margin-top:2px}
.body{display:grid;grid-template-columns:1fr 200px;flex:1;min-height:0;overflow:hidden}
.left{padding:16px 20px;display:flex;flex-direction:column;gap:12px;overflow:hidden;min-height:0}
.preview-box{background:#fff;border:2px solid #e0e8f0;border-radius:16px;padding:20px 24px;flex-shrink:0;min-height:110px;display:flex;align-items:center}
.pname{font-size:42px;font-weight:900;color:#185FA5;line-height:1.1}
.pid{font-size:17px;color:#666;margin-top:6px;font-weight:600}
.perr{font-size:18px;color:#c0392b;font-weight:700}
.phint{font-size:17px;color:#bbb}
.num-display{background:#fff;border:2px solid #c5d5e8;border-radius:12px;padding:12px 18px;font-size:52px;font-weight:900;letter-spacing:12px;color:#185FA5;text-align:center;font-variant-numeric:tabular-nums;min-height:82px;flex-shrink:0}
.input-area{display:flex;flex-direction:column;gap:2px;flex:1;min-height:0}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;flex:1;min-height:0}
.action-btns{display:flex;gap:10px;flex-shrink:0;height:110px}
.action-col{display:none}
.abtn{padding:0;border:none;border-radius:14px;cursor:pointer;font-weight:900;transition:all .15s;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:8px;flex:1;font-size:26px}
.abtn.submit{background:#185FA5;color:#fff}
.abtn.submit:disabled{background:#c5d5e8;color:#aaa;cursor:not-allowed}
.abtn.submit:active{transform:scale(.97)}
.abtn.reset{background:#f97316;color:#fff}
.abtn.reset:active{transform:scale(.97)}
.abtn .icon{font-size:22px;margin-bottom:0}
.success-msg{display:none;padding:12px 16px;background:#e1f5ee;border:2px solid #5dcaa5;border-radius:12px;text-align:center;font-size:15px;font-weight:700;color:#085041;flex-shrink:0}
.success-msg.show{display:block;animation:pop .3s ease}
.offline-msg{display:none;padding:8px 12px;background:#fff3cd;border-radius:8px;font-size:12px;color:#856404;text-align:center;flex-shrink:0}
.offline-msg.show{display:block}
.kbtn{padding:0;border:2px solid #c5d5e8;border-radius:12px;background:#fff;cursor:pointer;font-size:40px;font-weight:700;color:#222;user-select:none;display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.kbtn:active{background:#d0e4f5;transform:scale(.93)}
.kbtn.del{font-size:18px;color:#888;font-weight:700}
.kbtn.zero{grid-column:1/3}
.right{background:#185FA5;padding:16px;display:flex;flex-direction:column;gap:10px;overflow:hidden}
.r-section{background:rgba(255,255,255,.15);border-radius:12px;padding:12px;text-align:center;flex-shrink:0}
.r-label{font-size:12px;color:rgba(255,255,255,.8);margin-bottom:4px;font-weight:600}
.r-num{font-size:44px;font-weight:700;color:#fff;line-height:1}
.r-unit{font-size:14px;color:rgba(255,255,255,.8);margin-top:4px}
.r-list-title{font-size:13px;color:rgba(255,255,255,.8);font-weight:600;margin-bottom:8px;flex-shrink:0}
.mini-list{display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1;min-height:0}
.mini-item{padding:9px 12px;background:rgba(255,255,255,.18);border-radius:10px;font-size:14px;display:flex;gap:8px;align-items:center}
.mi-num{color:rgba(255,255,255,.6);font-size:12px;min-width:18px}
.mi-name{font-weight:700;color:#fff;flex:1}
.mi-id{font-size:12px;color:rgba(255,255,255,.6)}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes bellblink{0%,100%{opacity:1;background:#e63946}50%{opacity:.7;background:#c1121f}}
.bell-overlay{display:none;position:fixed;inset:0;z-index:999;background:#e63946;align-items:center;justify-content:center;flex-direction:column;gap:20px}
.bell-overlay.show{display:flex;animation:bellblink 0.8s infinite}
.bell-text{font-size:52px;font-weight:900;color:#fff;text-align:center;letter-spacing:2px;text-shadow:0 2px 12px rgba(0,0,0,.3)}
.bell-sub{font-size:28px;font-weight:700;color:rgba(255,255,255,.9);text-align:center}
.bell-timer{font-size:22px;color:rgba(255,255,255,.8);font-variant-numeric:tabular-nums}
</style>
</head>
<body>

<div id="pwa-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#185FA5;color:#fff;padding:12px 16px;z-index:9000;align-items:center;gap:10px;font-size:13px;box-shadow:0 -2px 12px rgba(0,0,0,.2)">
  <span style="flex:1" id="pwa-banner-text">📱 주소창 없이 사용하려면 <b>앱으로 설치</b>하세요</span>
  <button id="pwa-install-btn" style="padding:7px 14px;background:#fff;color:#185FA5;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer">설치</button>
  <button onclick="document.getElementById('pwa-banner').style.display='none'" style="padding:7px 10px;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer">✕</button>
</div>

<div class="bell-overlay" id="bell-overlay">
  <div class="bell-text">🔔 수업 종료</div>
  <div class="bell-sub">교실로 돌아가세요</div>
  <div class="bell-timer" id="bell-timer">30초 후 사라집니다</div>
</div>

<div class="header">
  <div class="htitle">보건실 대기 접수</div>
  <div class="clock-box">
    <div class="clock-time" id="clock-time">00:00:00</div>
    <div class="clock-date" id="clock-date"></div>
  </div>
</div>

<div class="body">
  <div class="left">
    <div class="offline-msg" id="offline-msg">서버 연결 중... 잠시 기다려주세요</div>
    <div class="preview-box" id="preview">
      <span class="phint">학번 4자리를 입력하세요</span>
    </div>
    <div class="num-display" id="num-disp">— — — —</div>
    <div class="input-area">
      <div class="keypad">
        <button class="kbtn" onclick="kp(1)">1</button>
        <button class="kbtn" onclick="kp(2)">2</button>
        <button class="kbtn" onclick="kp(3)">3</button>
        <button class="kbtn" onclick="kp(4)">4</button>
        <button class="kbtn" onclick="kp(5)">5</button>
        <button class="kbtn" onclick="kp(6)">6</button>
        <button class="kbtn" onclick="kp(7)">7</button>
        <button class="kbtn" onclick="kp(8)">8</button>
        <button class="kbtn" onclick="kp(9)">9</button>
        <button class="kbtn zero" onclick="kp(0)">0</button>
        <button class="kbtn del" onclick="kd()">지움</button>
      </div>
      <div class="action-btns">
        <button class="abtn submit" id="qbtn" onclick="submitQ()" disabled>
          <span class="icon">✔</span>대기신청
        </button>
        <button class="abtn reset" onclick="resetForm()">
          <span class="icon">↺</span>초기화
        </button>
      </div>
      <div class="success-msg" id="ok-msg"></div>
    </div>
  </div>

  <div class="right">
    <div class="r-section">
      <div class="r-label">현재 대기 인원</div>
      <div class="r-num" id="r-count">0</div>
      <div class="r-unit">명</div>
    </div>
    <div class="r-list-title">대기 목록</div>
    <div class="mini-list" id="r-list">
      <div style="text-align:center;padding:16px;font-size:13px;color:rgba(255,255,255,.5)">없음</div>
    </div>
  </div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbwQfbL9rITxJNFoPpklgJ8IB8WRq29Lg_Fvl4uqD1NJ2-yvE3DCQzxuPC57w0P710-J8g/exec';
let N='',found=null,submitting=false,studentDB={};

function tickClock(){
  const now=new Date();
  document.getElementById('clock-time').textContent=now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const days=['일','월','화','수','목','금','토'];
  document.getElementById('clock-date').textContent=now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'})+' ('+days[now.getDay()]+')';
}
tickClock();setInterval(tickClock,1000);

function apiCall(params){
  return new Promise((resolve)=>{
    const cb='cb'+Date.now()+Math.floor(Math.random()*9999);
    window[cb]=(d)=>{delete window[cb];const el=document.getElementById('s_'+cb);if(el)el.remove();resolve(d);};
    const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(String(v))).join('&');
    const s=document.createElement('script');
    s.id='s_'+cb;s.src=API+'?'+qs+'&callback='+cb;
    s.onerror=()=>{delete window[cb];s.remove();resolve({error:'network error'});};
    document.head.appendChild(s);
    setTimeout(()=>{if(window[cb]){delete window[cb];const el=document.getElementById('s_'+cb);if(el)el.remove();resolve({error:'timeout'});}},15000);
  });
}

async function loadStudents(){
  const res=await apiCall({action:'getStudents'});
  if(res.error||!res.students)return;
  studentDB={};
  res.students.forEach(s=>{studentDB[s.key]=s;});
}

function updateNumDisp(){
  const chars=N.split('');
  while(chars.length<4)chars.push('—');
  document.getElementById('num-disp').textContent=chars.join(' ');
}

function kp(n){
  if(N.length>=4)return;
  N+=String(n);
  updateNumDisp();
  check();
}
function kd(){
  N=N.slice(0,-1);
  updateNumDisp();
  check();
}

function check(){
  const p=document.getElementById('preview'),btn=document.getElementById('qbtn');
  found=null;
  if(N.length===4){
    const s=studentDB[N];
    if(s){
      found={...s};
      p.innerHTML=`<div><div class="pname">${s.name}</div><div class="pid">${N} &nbsp;·&nbsp; ${s.grade}학년 ${s.cls}반 ${N.slice(2)}번</div></div>`;
      btn.disabled=false;
    } else {
      p.innerHTML=`<span class="perr">학번 ${N}을 찾을 수 없습니다</span>`;
      btn.disabled=true;
    }
  } else if(N.length>0){
    p.innerHTML=`<span class="phint">학번 4자리를 입력하세요 (${N.length}/4)</span>`;
    btn.disabled=true;
  } else {
    p.innerHTML='<span class="phint">학번 4자리를 입력하세요</span>';
    btn.disabled=true;
  }
}

function resetForm(){
  N='';found=null;submitting=false;
  updateNumDisp();
  document.getElementById('preview').innerHTML='<span class="phint">학번 4자리를 입력하세요</span>';
  document.getElementById('qbtn').disabled=true;
}

async function submitQ(){
  if(!found||submitting)return;
  const res0=await apiCall({action:'getQueue'});
  if(res0.queue){
    const dup=res0.queue.find(e=>e.key===found.key);
    if(dup){
      const msg=document.getElementById('ok-msg');
      msg.textContent=`${found.name} 학생은 이미 대기 중입니다!`;
      msg.style.cssText='background:#fef2f2;border-color:#fca5a5;color:#7f1d1d';
      msg.classList.add('show');
      setTimeout(()=>{msg.classList.remove('show');msg.style='';},3000);
      resetForm();return;
    }
  }
  submitting=true;
  document.getElementById('qbtn').disabled=true;
  const now=new Date();
  const s=found;
  const res=await apiCall({action:'addQueue',key:s.key,name:s.name,grade:s.grade,cls:s.cls,num:N.slice(2),
    time:now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),
    date:now.toLocaleDateString('ko-KR'),ts:now.getTime()});
  const msg=document.getElementById('ok-msg');
  msg.style='';
  msg.textContent=res.error?'오류가 발생했습니다. 다시 시도해주세요.':`${s.name} 학생 대기 접수 완료!`;
  msg.classList.add('show');
  setTimeout(()=>msg.classList.remove('show'),3000);
  resetForm();
  loadQueue();
}

let bellShown=false,bellTimer=null;
function showBellOverlay(){
  if(bellShown)return;
  bellShown=true;
  const ov=document.getElementById('bell-overlay');
  ov.classList.add('show');
  let sec=30;
  document.getElementById('bell-timer').textContent=`${sec}초 후 사라집니다`;
  bellTimer=setInterval(()=>{
    sec--;
    document.getElementById('bell-timer').textContent=`${sec}초 후 사라집니다`;
    if(sec<=0){clearInterval(bellTimer);ov.classList.remove('show');bellShown=false;}
  },1000);
}

async function loadQueue(){
  const res=await apiCall({action:'getQueue'});
  if(res.error||!res.queue){
    document.getElementById('offline-msg').classList.add('show');
    document.getElementById('offline-msg').textContent='서버 연결 오류. 잠시 후 재시도합니다.';
    return;
  }
  document.getElementById('offline-msg').classList.remove('show');
  const q=res.queue;
  const bellItem=q.find(e=>e.key==='__BELL__');
  if(bellItem&&!bellShown){showBellOverlay();apiCall({action:'doneQueue',key:'__BELL__'});}
  const filtered=q.filter(e=>e.key!=='__BELL__');
  document.getElementById('r-count').textContent=filtered.length;
  const list=document.getElementById('r-list');
  if(!filtered.length){list.innerHTML='<div style="text-align:center;padding:16px;font-size:13px;color:rgba(255,255,255,.5)">없음</div>';return;}
  list.innerHTML=filtered.map((e,i)=>`<div class="mini-item"><span class="mi-num">${i+1}</span><span class="mi-name">${e.name}</span><span class="mi-id">${e.key}</span></div>`).join('');
}

// 터치 즉시 반응
function addTouchClick(el,fn){
  let touched=false;
  el.addEventListener('touchstart',e=>{touched=true;e.preventDefault();fn();},{passive:false});
  el.addEventListener('click',()=>{if(!touched)fn();touched=false;});
}
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.kbtn,.abtn').forEach(btn=>{
    const oc=btn.getAttribute('onclick');
    if(oc){btn.removeAttribute('onclick');addTouchClick(btn,()=>eval(oc));}
  });
});

loadStudents().then(()=>loadQueue());
setInterval(loadQueue,5000);
setInterval(loadStudents,60000);

// PWA 설치 유도
let _pwaPrompt=null;
const banner=document.getElementById('pwa-banner');
const installBtn=document.getElementById('pwa-install-btn');
// 이미 설치된 경우 배너 숨김
if(window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone){
  // 이미 앱 모드 - 배너 불필요
} else {
  // Chrome/Edge: beforeinstallprompt 지원
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();
    _pwaPrompt=e;
    banner.style.display='flex';
    installBtn.onclick=async()=>{
      _pwaPrompt.prompt();
      const r=await _pwaPrompt.userChoice;
      banner.style.display='none';
      _pwaPrompt=null;
    };
  });
  // 삼성 인터넷 / Safari 등 beforeinstallprompt 미지원 브라우저: 수동 안내
  window.addEventListener('load',()=>{
    if(_pwaPrompt)return; // 이미 prompt 있으면 생략
    const isSamsung=/SamsungBrowser/i.test(navigator.userAgent);
    const isSafari=/Safari/i.test(navigator.userAgent)&&!/Chrome/i.test(navigator.userAgent);
    if(isSamsung||isSafari){
      document.getElementById('pwa-banner-text').innerHTML=
        isSamsung
        ? '📱 주소창 숨기기: 우측 하단 <b>⋮ 메뉴 → 홈 화면에 추가</b>'
        : '📱 주소창 숨기기: 하단 <b>공유 → 홈 화면에 추가</b>';
      installBtn.style.display='none';
      banner.style.display='flex';
    }
  });
}
window.addEventListener('appinstalled',()=>{banner.style.display='none';});
</script>
</body>
</html>
